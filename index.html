<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <title>王佳文的網站</title>

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO Meta -->
    <meta name="description" content="王佳文的網站">
    <meta name="keywords" content="王佳文, wjw, GitHub Pages, 網站建置, 技術分享">
    <meta name="author" content="王佳文, wjw">
    <meta name="robots" content="index, follow">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Tangerine"/>
    <script src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-3.6.4.js"></script>
    
    <style>
        body {
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Noto Sans TC', sans-serif;

        }

        #title {
            display: none;
            font-size: 48px;
            text-align: center;
            margin-top: 50px;
            color: #333;
            text-shadow: 2px 2px 5px #ccc;
        }

        #container{
            padding: 2rem 0
        }

        #Introduction {
            display: none;
            font-size: 24px;
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        nav {
            background-color: #333;
            color: #fff;
            padding: 10px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        nav li {
            margin: 0 20px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 20px;
            font-weight: bolder;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>

</head>
<body>
    <nav>
        <ul>
            <a>wjw</a>
        </ul>
    </nav>
    
    <div id="container">
        <h1 id="title">歡迎來到我的網站！</h1>
        <p id="Introduction">這是我基於 GitHub Pages 提供的的服務所建置的網站，請多多指教。</p>
    </div>
    
    <script src="asset/js/script.js"></script>
</body>
</html>
